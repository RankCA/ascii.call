<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Paper theme -->
  <rect width="512" height="512" fill="#f0ede8"/>

  <!-- Subtle border -->
  <rect x="14" y="14" width="484" height="484" rx="14"
        fill="none" stroke="#ccc8c2" stroke-width="2"/>

  <!-- ASCII.CALL — two lines, large monospace -->
  <text
    x="256" y="210"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="80"
    font-weight="bold"
    fill="#1a1a1a"
    letter-spacing="4">ASCII</text>

  <text
    x="256" y="308"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="80"
    font-weight="bold"
    fill="#1a1a1a"
    letter-spacing="4">.CALL</text>

  <!-- Rule -->
  <line x1="64" y1="356" x2="448" y2="356"
        stroke="#ccc8c2" stroke-width="1.5"/>

  <!-- Sub-label -->
  <text
    x="256" y="390"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="22"
    fill="#888"
    letter-spacing="8">VIDEO · ASCII</text>
</svg>
